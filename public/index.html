<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wird geladen...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: #0b0b0f;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      font-family: 'Inter', system-ui, sans-serif;
      color: white;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid rgba(157, 78, 221, 0.25);
      border-top-color: #9d4edd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #status {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.9rem;
      letter-spacing: 0.02em;
    }

    .error-box {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.3);
      border-radius: 16px;
      padding: 24px 32px;
      max-width: 420px;
      text-align: center;
    }

    .error-box h3 {
      color: #ff6b6b;
      margin-bottom: 10px;
      font-size: 1.1rem;
    }

    .error-box p {
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <p id="status">Verbindung wird aufgebaut…</p>

  <!-- Reihenfolge wichtig: zuerst baremux, dann UV bundle, dann config -->
  <script src="/baremux/index.js"></script>
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>

  <script>
    (async () => {
      const status = document.getElementById('status');
      const spinner = document.getElementById('spinner');

      try {
        // 1. Wisp-URL bestimmen
        const wispUrl = (location.protocol === "https:" ? "wss" : "ws")
          + "://" + location.host + "/wisp/";

        // 2. Bare-Mux mit Epoxy-Transport einrichten
        status.textContent = 'Proxy wird konfiguriert…';
        const bc = new BareMux.BareMuxConnection("/baremux/worker.js");
        await bc.setTransport("/epoxy/index.mjs", [{ wisp: wispUrl }]);

        // 3. Service Worker registrieren (nur einmal nötig)
        status.textContent = 'Service Worker wird aktiviert…';
        if (!navigator.serviceWorker.controller) {
          await navigator.serviceWorker.register("/uv/uv.sw.js", {
            scope: "/service/",
          });
          await navigator.serviceWorker.ready;
        }

        // 4. Ziel-URL aus Query-String lesen und weiterleiten
        const params = new URLSearchParams(location.search);
        const targetUrl = params.get("url");

        if (targetUrl) {
          status.textContent = 'Seite wird geladen…';
          location.href = "/service/" + __uv$config.encodeUrl(targetUrl);
        } else {
          spinner.style.display = 'none';
          status.textContent = '✅ Proxy bereit! Benutze ?url=https://example.com';
        }

      } catch (err) {
        spinner.style.display = 'none';
        status.style.display = 'none';

        const box = document.createElement('div');
        box.className = 'error-box';
        box.innerHTML = `
          <h3>⚠️ Fehler beim Starten</h3>
          <p>${err.message || 'Unbekannter Fehler. Bitte Seite neu laden.'}</p>
        `;
        document.body.appendChild(box);
        console.error('[Proxy] Fehler:', err);
      }
    })();
  </script>
</body>
</html>
